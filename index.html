<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <link href="bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center fw-bold text-primary mb-4">Stock Inventory System</h2>
        <div class="row g-3 mb-4">
        <div class="text-center mb-4">
    <h5 id="realTimeClock" class="text-muted fw-bold"></h5>
</div>

    <div class="col-md-6">
        <div class="card shadow-sm border-0 bg-white p-3 text-center">
            <h5 class="text-muted mb-1">Status: <span class="text-success fw-bold">NORMAL</span></h5>
            <h2 id="normalCount" class="fw-bold mb-0">0</h2>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card shadow-sm border-0 bg-white p-3 text-center">
            <h5 class="text-muted mb-1">Status: <span class="text-danger fw-bold">RESTOCK</span></h5>
            <h2 id="restockCount" class="fw-bold mb-0">0</h2>
        </div>
    </div>
</div>

<div class="row mb-3">
    <div class="col-12">
        <div class="btn-group w-100" role="group">
            <button type="button" class="btn btn-outline-secondary active" onclick="filterByStatus('all', this)">All Items</button>
            <button type="button" class="btn btn-outline-success" onclick="filterByStatus('normal', this)">Normal Stock</button>
            <button type="button" class="btn btn-outline-danger" onclick="filterByStatus('restock', this)">Needs Restock</button>
        </div>
    </div>
</div>

        <div class="row g-3 mb-4">
    <div class="col-md-7">
        <input type="text" id="searchInput" class="form-control" placeholder="Search Part, Description, Remark..." onkeyup="searchData()">
    </div>
    <div class="col-md-5 d-flex gap-2">
        <button class="btn btn-primary w-100 fw-bold" onclick="addNewItem()">+ Add New Item</button>
        
        <button class="btn btn-outline-primary fw-bold" onclick="showHistory()" title="View History">
             <i class="bi bi-clock-history"></i> History
        </button>
    </div>
</div>

        <div class="table-responsive shadow rounded bg-white">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark text-white">
                    <tr>
                        <th class="ps-3">No.</th>
                        <th>Part</th>
                        <th>Description</th>
                        <th>Manufac</th>
                        <th>Remark</th>
                        <th>Qty</th>
                        <th>Min</th>
                        <th>Status</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody"></tbody>
            </table>
        </div>
    </div>
    <div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title"><i class="bi bi-clock-history"></i> Transaction History</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table table-sm table-hover">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Part</th>
                                <th>Manufac</th>
                                <th>Remark</th>
                                <th>Type</th>
                                <th>Qty</th>
                                <th>Description / Detail</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
</body>
</html>
